name: 어디수업 파이프라인 (자동 업데이트)

on:
  # 1. 자동 스케줄 (매년 2월 1일, 8월 1일 KST 오전 9시)
  schedule:
    - cron: '0 0 1 2,8 *'
  
  # 2. 수동 실행 버튼
  workflow_dispatch:
    inputs:
      year:
        description: '학년도 (예: 2026, 비워두면 자동 계산)'
        required: false
      semester:
        description: '학기 (10: 1학기, 20: 2학기, 비워두면 자동 계산)'
        required: false

jobs:
  run-pipeline:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: 저장소 체크아웃
        uses: actions/checkout@v4

      - name: Node.js 세팅 (버전 20)
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: 패키지 설치
        run: npm ci

      - name: 학년도/학기 동적 설정
        run: |
          if [ -n "${{ github.event.inputs.year }}" ]; then
            echo "YEAR=${{ github.event.inputs.year }}" >> $GITHUB_ENV
            echo "SEMESTER=${{ github.event.inputs.semester }}" >> $GITHUB_ENV
          else
            YEAR=$(date +%Y)
            MONTH=$(date +%-m)
            if [ $MONTH -lt 7 ]; then SEMESTER=10; else SEMESTER=20; fi
            echo "YEAR=$YEAR" >> $GITHUB_ENV
            echo "SEMESTER=$SEMESTER" >> $GITHUB_ENV
          fi
          
      - name: Firebase 🔑 서비스 계정 키 생성
        run: |
          mkdir -p config
          echo '${{ secrets.FIREBASE_SERVICE_ACCOUNT }}' > ./config/serviceAccountKey.json

      - name: 🚀 파이프라인 실행 (크롤링 -> ETL -> Firebase 업로드)
        run: npm run pipeline

      - name: 📦 결과 데이터 아티팩트 보관
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: crawl-data-${{ env.YEAR }}-${{ env.SEMESTER }}
          path: data/*.json
          retention-days: 90
